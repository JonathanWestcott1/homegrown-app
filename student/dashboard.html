<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Homegrown — Your Jobs</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="../shared/styles.css" />
  <style>
    .profile-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #EAF3DE;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #3B6D11;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-family: inherit;
      flex-shrink: 0;
    }

    /* Sheet overlay */
    .sheet-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 100;
      align-items: flex-end;
    }
    .sheet-overlay.open { display: flex; }

    .sheet {
      width: 100%;
      max-width: 390px;
      margin: 0 auto;
      background: #FAFAF8;
      border-radius: 20px 20px 0 0;
      padding: 0 0 32px;
      transform: translateY(100%);
      transition: transform 0.3s ease;
    }
    .sheet-overlay.open .sheet { transform: translateY(0); }

    .sheet-handle {
      width: 36px;
      height: 4px;
      background: #D3D1C7;
      border-radius: 2px;
      margin: 12px auto 20px;
    }

    .sheet-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 20px 20px;
      border-bottom: 0.5px solid #D3D1C7;
    }
    .sheet-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #EAF3DE;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 600;
      color: #3B6D11;
      flex-shrink: 0;
    }
    .sheet-name { font-size: 16px; font-weight: 600; color: #1C1C1A; letter-spacing: -0.3px; }
    .sheet-email { font-size: 13px; color: #666660; margin-top: 2px; }

    .sheet-section {
      padding: 16px 20px;
      border-bottom: 0.5px solid #D3D1C7;
    }
    .sheet-section-label {
      font-size: 10px;
      font-weight: 600;
      color: #B4B2A9;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .sheet-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
    }
    .sheet-row:last-child { margin-bottom: 0; }
    .sheet-row-label { font-size: 13px; color: #666660; }
    .sheet-row-value { font-size: 13px; font-weight: 500; color: #1C1C1A; text-align: right; max-width: 60%; }

    .sheet-cert-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .sheet-cert-pill {
      font-size: 11px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 20px;
      background: #EAF3DE;
      color: #3B6D11;
      border: 0.5px solid #C0DD97;
    }
    .sheet-cert-none { font-size: 13px; color: #B4B2A9; }

    .sheet-edit {
      display: block;
      width: calc(100% - 40px);
      margin: 16px 20px 0;
      padding: 13px;
      font-size: 14px;
      font-weight: 500;
      color: #3B6D11;
      background: transparent;
      border: 0.5px solid #3B6D11;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      text-align: center;
    }
    .sheet-edit:hover { background: #EAF3DE; }

    .sheet-logout {
      display: block;
      width: calc(100% - 40px);
      margin: 16px 20px 0;
      padding: 13px;
      font-size: 14px;
      font-weight: 500;
      color: #c0392b;
      background: transparent;
      border: 0.5px solid #f5c6c2;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      text-align: center;
    }
    .sheet-logout:hover { background: #fdf2f1; }
  </style>
</head>
<body>
<div class="app-wrap">

  <div class="app-header">
    <div style="display:flex;align-items:center;gap:7px;">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M11 18V10" stroke="#3B6D11" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M11 10C11 10 6 9 5 4C5 4 10 3 13 7C14.5 9 11 10 11 10Z" fill="#3B6D11" opacity="0.9"/>
        <path d="M11 13C11 13 14.5 11.5 17 13C17 13 16 17 13 17.5C11.5 17.7 11 13 11 13Z" fill="#639922" opacity="0.7"/>
      </svg>
      <span style="font-size:16px;font-weight:600;color:#1C1C1A;letter-spacing:-0.4px;">home<span style="color:#3B6D11;">grown</span>.ai</span>
    </div>
    <button class="profile-avatar" id="profile-btn" onclick="openSheet()">–</button>
  </div>

  <div class="app-content">
    <div class="app-step-title" id="feed-title">Jobs for you</div>
    <div class="app-step-sub">Updated daily</div>
    <div id="job-feed">
      <div id="jobs-loading" style="display:flex;flex-direction:column;align-items:center;padding:48px 0;gap:12px;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="animation:spin 1s linear infinite;">
          <circle cx="12" cy="12" r="10" stroke="#D3D1C7" stroke-width="2.5"/>
          <path d="M12 2a10 10 0 0 1 10 10" stroke="#3B6D11" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        <span style="font-size:13px;color:#B4B2A9;">Finding jobs for you…</span>
      </div>
    </div>
    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
  </div>

</div>

<!-- Profile sheet -->
<div class="sheet-overlay" id="sheet-overlay" onclick="closeSheetOnOverlay(event)">
  <div class="sheet" id="profile-sheet">
    <div class="sheet-handle"></div>

    <div class="sheet-header">
      <div class="sheet-avatar" id="sheet-avatar">–</div>
      <div>
        <div class="sheet-name" id="sheet-name">–</div>
        <div class="sheet-email" id="sheet-email">–</div>
      </div>
    </div>

    <div class="sheet-section">
      <div class="sheet-section-label">Background</div>
      <div class="sheet-row">
        <span class="sheet-row-label">Path</span>
        <span class="sheet-row-value" id="sheet-path">–</span>
      </div>
      <div class="sheet-row" id="sheet-program-row" style="display:none;">
        <span class="sheet-row-label">Program</span>
        <span class="sheet-row-value" id="sheet-program">–</span>
      </div>
      <div class="sheet-row" id="sheet-year-row" style="display:none;">
        <span class="sheet-row-label">Graduation year</span>
        <span class="sheet-row-value" id="sheet-year">–</span>
      </div>
      <div class="sheet-row" id="sheet-county-row" style="display:none;">
        <span class="sheet-row-label">County</span>
        <span class="sheet-row-value" id="sheet-county">–</span>
      </div>
      <div class="sheet-row" id="sheet-industries-row" style="display:none;">
        <span class="sheet-row-label">Interests</span>
        <span class="sheet-row-value" id="sheet-industries">–</span>
      </div>
    </div>

    <div class="sheet-section">
      <div class="sheet-section-label">Certifications</div>
      <div id="sheet-certs"><span class="sheet-cert-none">None selected</span></div>
    </div>

    <button class="sheet-edit" onclick="window.location.href='/student/onboarding.html'">Edit my information</button>
    <button class="sheet-logout" onclick="logout()">Log out</button>
  </div>
</div>

<script>
  const _sb = window.supabase.createClient(
    'https://mccrpgqtqtrxfifxvwbd.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jY3JwZ3F0cXRyeGZpZnh2d2JkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NTAwMDIsImV4cCI6MjA5NDEyNjAwMn0.iB3u2M7H0-D2Z2SbRQN0vHtOB62sASsGeF09FICzcc4'
  );

  let currentSession = null;

  (async () => {
    const { data: { session } } = await _sb.auth.getSession();
    if (!session) { window.location.href = '/'; return; }
    currentSession = session;

    const email = session.user.email || '';
    const initial = email.charAt(0).toUpperCase();
    document.getElementById('profile-btn').textContent = initial;
    document.getElementById('sheet-avatar').textContent = initial;
    document.getElementById('sheet-email').textContent = email;

    const profile = JSON.parse(localStorage.getItem('hg_profile') || 'null');
    populateSheet(session.user, profile);

    const county = profile?.county;
    if (county) {
      document.getElementById('feed-title').textContent = 'Jobs for you in ' + county;
    }

    const [{ data: studentData }, { data: jobs, error: jobsError }] = await Promise.all([
      _sb.from('students').select('certifications').eq('id', session.user.id).single(),
      _sb.from('jobs').select('*').eq('is_active', true).order('created_at', { ascending: false })
    ]);

    if (jobsError) {
      console.error('[homegrown] jobs query error:', jobsError);
    }
    console.log('[homegrown] jobs returned:', jobs?.length ?? 0, jobs);

    const myCerts = studentData?.certifications || profile?.certifications || [];
    document.getElementById('jobs-loading').remove();
    renderJobs(jobs || [], myCerts);
  })();

  function populateSheet(user, profile) {
    const meta = user.user_metadata || {};
    const name = meta.full_name || meta.name || '';
    document.getElementById('sheet-name').textContent = name || user.email;

    if (!profile) return;

    const bgLabels = { boces: 'BOCES Program', college: 'College', job: 'On the Job', military: 'Military / Veteran' };
    const backgrounds = profile.backgrounds || (profile.path ? [profile.path] : []);
    const pathLabel = backgrounds.map(b => bgLabels[b] || b).join(', ') || '–';
    document.getElementById('sheet-path').textContent = pathLabel;

    const program = profile.boces_program || profile.program || null;
    if (program) {
      document.getElementById('sheet-program').textContent = program;
      document.getElementById('sheet-program-row').style.display = 'flex';
    }
    if (profile.graduation_year) {
      document.getElementById('sheet-year').textContent = profile.graduation_year;
      document.getElementById('sheet-year-row').style.display = 'flex';
    }
    if (profile.county) {
      document.getElementById('sheet-county').textContent = profile.county;
      document.getElementById('sheet-county-row').style.display = 'flex';
    }
    if (profile.industries && profile.industries.length > 0) {
      document.getElementById('sheet-industries').textContent = profile.industries.join(', ');
      document.getElementById('sheet-industries-row').style.display = 'flex';
    }

    const certs = profile.certifications || [];
    const certsEl = document.getElementById('sheet-certs');
    if (certs.length > 0) {
      certsEl.innerHTML = '<div class="sheet-cert-pills">' +
        certs.map(c => `<span class="sheet-cert-pill">${esc(c)}</span>`).join('') +
        '</div>';
    }
  }

  function openSheet() {
    const overlay = document.getElementById('sheet-overlay');
    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeSheet() {
    document.getElementById('sheet-overlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  function closeSheetOnOverlay(e) {
    if (e.target === document.getElementById('sheet-overlay')) closeSheet();
  }

  function renderJobs(jobs, myCerts) {
    const feed = document.getElementById('job-feed');

    if (jobs.length === 0) {
      feed.innerHTML = `
        <div style="text-align:center;padding:40px 0 20px;color:#999;font-size:14px;line-height:1.6;">
          No jobs posted yet —<br>check back soon as employers join.
        </div>
        <div style="text-align:center;font-size:13px;color:#bbb;padding-bottom:32px;">
          More jobs coming soon as we onboard local employers.
        </div>`;
      return;
    }

    feed.innerHTML = jobs.map((job, idx) => {
      const reqCerts = job.certifications_required || [];
      const allMet = reqCerts.length === 0 || reqCerts.every(c => myCerts.includes(c));

      // Support both new and legacy column names
      const roleTitle = job.role_title || job.role || '';
      const locationStr = [job.city, job.state].filter(Boolean).join(', ') || job.location || '';
      const shiftStr = job.shift_type || job.shift || '';
      const jobTypeStr = job.job_type || '';

      const pillValues = [shiftStr, jobTypeStr, job.benefits, job.is_union ? 'Union' : null, job.sign_on_bonus ? `${job.sign_on_bonus} sign-on` : null]
        .filter(Boolean);
      const pills = pillValues.map(p => `<span class="app-fit-pill">${esc(p)}</span>`).join('');

      // Sponsorship badges
      const sponsorBadges = [
        job.sponsors_certifications ? '✓ Sponsors your certs' : null,
        job.offers_apprenticeships  ? '✓ Apprenticeships available' : null
      ].filter(Boolean);
      const sponsorPills = sponsorBadges.map(b =>
        `<span style="font-size:11px;font-weight:500;padding:4px 8px;border-radius:6px;background:#EAF3DE;color:#3B6D11;">${b}</span>`
      ).join('');

      const certPills = reqCerts.map(c => {
        const has = myCerts.includes(c);
        return `<span class="app-cert-pill ${has ? 'app-cert-green' : 'app-cert-gray'}">${has ? '✓' : '+'} ${c}</span>`;
      }).join('');

      const btn = allMet
        ? `<button class="app-btn-primary">Apply Now</button>`
        : `<button class="app-btn-gray">Complete certs to apply</button>`;

      const hasDesc = job.student_description && job.student_description.trim().length > 0;
      const descId  = `desc-${idx}`;

      return `
        <div class="app-job-card">
          <div class="app-job-company">${esc(job.company_name)}</div>
          <div class="app-job-role">${esc(roleTitle)}</div>
          ${locationStr ? `<div class="app-job-location">📍 ${esc(locationStr)}</div>` : ''}
          ${job.pay ? `<div class="app-job-pay">${esc(job.pay)}</div>` : ''}
          ${pills ? `<div class="app-fit-pills">${pills}</div>` : ''}
          ${sponsorBadges.length > 0 ? `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;">${sponsorPills}</div>` : ''}
          ${reqCerts.length > 0 ? `
            <div class="app-cert-row">
              <div class="app-cert-label">Certifications</div>
              <div class="app-cert-pills">${certPills}</div>
            </div>` : ''}
          ${hasDesc ? `
            <div class="job-desc-expand" id="${descId}" style="overflow:hidden;max-height:0;transition:max-height 0.35s ease;">
              <div style="padding-top:10px;border-top:0.5px solid #D3D1C7;margin-top:10px;">
                <div class="app-cert-label">What the job is actually like</div>
                <div style="font-size:13px;color:#444441;line-height:1.6;font-style:italic;">${esc(job.student_description)}</div>
              </div>
            </div>
            <button onclick="toggleDesc('${descId}',this)" style="background:none;border:none;padding:0;font-size:12px;color:#3B6D11;text-decoration:underline;cursor:pointer;font-family:inherit;margin-top:10px;display:block;">What's it like? ↓</button>` : ''}
          ${btn}
        </div>`;
    }).join('') + `
      <div style="text-align:center;font-size:13px;color:#999;margin-top:8px;padding-bottom:32px;">
        More jobs coming soon as we onboard local employers.
      </div>`;
  }

  function toggleDesc(id, btn) {
    const el = document.getElementById(id);
    const isOpen = el.style.maxHeight !== '0px' && el.style.maxHeight !== '';
    if (isOpen) {
      el.style.maxHeight = '0';
      btn.textContent = "What's it like? ↓";
    } else {
      el.style.maxHeight = el.scrollHeight + 'px';
      btn.textContent = "Show less ↑";
    }
  }

  function esc(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function logout() {
    await _sb.auth.signOut();
    window.location.href = '/';
  }
</script>
</body>
</html>
