<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Homegrown — Your Jobs</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="../shared/styles.css" />
  <style>
    .profile-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #EAF3DE;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #3B6D11;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-family: inherit;
      flex-shrink: 0;
    }

    /* Sheet overlay */
    .sheet-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 100;
      align-items: flex-end;
    }
    .sheet-overlay.open { display: flex; }

    .sheet {
      width: 100%;
      max-width: 390px;
      margin: 0 auto;
      background: #FAFAF8;
      border-radius: 20px 20px 0 0;
      padding: 0 0 32px;
      transform: translateY(100%);
      transition: transform 0.3s ease;
    }
    .sheet-overlay.open .sheet { transform: translateY(0); }

    .sheet-handle {
      width: 36px;
      height: 4px;
      background: #D3D1C7;
      border-radius: 2px;
      margin: 12px auto 20px;
    }

    .sheet-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 20px 20px;
      border-bottom: 0.5px solid #D3D1C7;
    }
    .sheet-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #EAF3DE;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 600;
      color: #3B6D11;
      flex-shrink: 0;
    }
    .sheet-name { font-size: 16px; font-weight: 600; color: #1C1C1A; letter-spacing: -0.3px; }
    .sheet-email { font-size: 13px; color: #666660; margin-top: 2px; }

    .sheet-section {
      padding: 16px 20px;
      border-bottom: 0.5px solid #D3D1C7;
    }
    .sheet-section-label {
      font-size: 10px;
      font-weight: 600;
      color: #B4B2A9;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .sheet-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
    }
    .sheet-row:last-child { margin-bottom: 0; }
    .sheet-row-label { font-size: 13px; color: #666660; }
    .sheet-row-value { font-size: 13px; font-weight: 500; color: #1C1C1A; text-align: right; max-width: 60%; }

    .sheet-cert-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .sheet-cert-pill {
      font-size: 11px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 20px;
      background: #EAF3DE;
      color: #3B6D11;
      border: 0.5px solid #C0DD97;
    }
    .sheet-cert-none { font-size: 13px; color: #B4B2A9; }

    .sheet-edit {
      display: block;
      width: calc(100% - 40px);
      margin: 16px 20px 0;
      padding: 13px;
      font-size: 14px;
      font-weight: 500;
      color: #3B6D11;
      background: transparent;
      border: 0.5px solid #3B6D11;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      text-align: center;
    }
    .sheet-edit:hover { background: #EAF3DE; }

    .sheet-logout {
      display: block;
      width: calc(100% - 40px);
      margin: 16px 20px 0;
      padding: 13px;
      font-size: 14px;
      font-weight: 500;
      color: #c0392b;
      background: transparent;
      border: 0.5px solid #f5c6c2;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      text-align: center;
    }
    .sheet-logout:hover { background: #fdf2f1; }

    /* ── Photo upload ── */
    .photo-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 20px 16px;
      border-bottom: 0.5px solid #D3D1C7;
    }
    .photo-circle {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      background: #EAF3DE;
      border: 2px dashed #C0DD97;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: border-color 0.15s;
      flex-shrink: 0;
    }
    .photo-circle:hover { border-color: #3B6D11; }
    .photo-circle.has-photo { border: 2.5px solid #3B6D11; }
    .photo-circle img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }
    .photo-edit-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.35);
      border-radius: 50%;
      align-items: center;
      justify-content: center;
    }
    .photo-circle.has-photo:hover .photo-edit-overlay { display: flex; }
    .photo-label {
      margin-top: 10px;
      font-size: 12px;
      font-weight: 500;
      color: #3B6D11;
      cursor: pointer;
    }
    .photo-uploading {
      font-size: 11px;
      color: #999;
      margin-top: 6px;
      display: none;
    }
    /* Nav avatar with photo */
    .profile-avatar img {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
    }

    /* Cert editor in profile sheet */
    .cert-edit-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 0.5px solid #F0EFE9;
      cursor: pointer;
      user-select: none;
    }
    .cert-edit-row:last-of-type { border-bottom: none; }
    .cert-edit-box {
      width: 20px;
      height: 20px;
      border: 1.5px solid #D3D1C7;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: transparent;
      background: #fff;
      flex-shrink: 0;
      transition: all 0.12s;
    }
    .cert-edit-row.cert-edit-selected .cert-edit-box {
      background: #3B6D11;
      border-color: #3B6D11;
      color: #fff;
    }
    .cert-edit-label { font-size: 13px; color: #1C1C1A; line-height: 1.35; }
    .sponsor-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #EAF3DE;
      border: 0.5px solid #C0DD97;
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 11px;
      font-weight: 600;
      color: #3B6D11;
      margin-top: 10px;
    }
  </style>
</head>
<body>
<div class="app-wrap">

  <div class="app-header">
    <button onclick="location.reload()" style="display:flex;align-items:center;gap:7px;background:none;border:none;cursor:pointer;padding:0;font-family:inherit;">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M11 18V10" stroke="#3B6D11" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M11 10C11 10 6 9 5 4C5 4 10 3 13 7C14.5 9 11 10 11 10Z" fill="#3B6D11" opacity="0.9"/>
        <path d="M11 13C11 13 14.5 11.5 17 13C17 13 16 17 13 17.5C11.5 17.7 11 13 11 13Z" fill="#639922" opacity="0.7"/>
      </svg>
      <span style="font-size:16px;font-weight:600;color:#1C1C1A;letter-spacing:-0.4px;">home<span style="color:#3B6D11;">grown</span>.ai</span>
    </button>
    <button class="profile-avatar" id="profile-btn" onclick="openSheet()">–</button>
  </div>

  <div class="app-content">
    <div class="app-step-title" id="feed-title">Jobs for you</div>
    <div class="app-step-sub">Updated daily</div>
    <div id="job-feed">
      <div id="jobs-loading" style="display:flex;flex-direction:column;align-items:center;padding:48px 0;gap:12px;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="animation:spin 1s linear infinite;">
          <circle cx="12" cy="12" r="10" stroke="#D3D1C7" stroke-width="2.5"/>
          <path d="M12 2a10 10 0 0 1 10 10" stroke="#3B6D11" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        <span style="font-size:13px;color:#B4B2A9;">Finding jobs for you…</span>
      </div>
    </div>
    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
  </div>

</div>

<!-- Profile sheet -->
<div class="sheet-overlay" id="sheet-overlay" onclick="closeSheetOnOverlay(event)">
  <div class="sheet" id="profile-sheet">
    <div class="sheet-handle" id="sheet-drag-handle"></div>

    <!-- Photo upload -->
    <div class="photo-section">
      <div class="photo-circle" id="photo-circle" onclick="document.getElementById('photo-input').click()">
        <div id="photo-placeholder" style="display:flex;flex-direction:column;align-items:center;gap:4px;">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#3B6D11" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
        </div>
        <img id="photo-preview" src="" alt="Profile photo" style="display:none;" />
        <div class="photo-edit-overlay">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
        </div>
      </div>
      <div class="photo-label" id="photo-label" onclick="document.getElementById('photo-input').click()">Add a professional photo</div>
      <div class="photo-uploading" id="photo-uploading">Uploading…</div>
    </div>
    <input type="file" id="photo-input" accept="image/*" style="display:none;" onchange="handlePhotoSelect(event)" />

    <!-- Name / email -->
    <div style="text-align:center;padding:20px 20px 20px;border-bottom:0.5px solid #D3D1C7;">
      <div id="sheet-avatar" style="display:none;"></div>
      <div class="sheet-name" id="sheet-name" style="font-size:18px;font-weight:600;color:#1C1C1A;letter-spacing:-0.4px;">–</div>
      <div class="sheet-email" id="sheet-email" style="font-size:13px;color:#666660;margin-top:3px;">–</div>
      <div id="sheet-phone-display" style="font-size:13px;color:#666660;margin-top:2px;display:none;"></div>
    </div>

    <div class="sheet-section">
      <div class="sheet-section-label">Background</div>
      <div class="sheet-row">
        <span class="sheet-row-label">Path</span>
        <span class="sheet-row-value" id="sheet-path">–</span>
      </div>
      <div class="sheet-row" id="sheet-program-row" style="display:none;">
        <span class="sheet-row-label">Program</span>
        <span class="sheet-row-value" id="sheet-program">–</span>
      </div>
      <div class="sheet-row" id="sheet-year-row" style="display:none;">
        <span class="sheet-row-label">Graduation year</span>
        <span class="sheet-row-value" id="sheet-year">–</span>
      </div>
      <div class="sheet-row" id="sheet-county-row" style="display:none;">
        <span class="sheet-row-label">County</span>
        <span class="sheet-row-value" id="sheet-county">–</span>
      </div>
      <div class="sheet-row" id="sheet-industries-row" style="display:none;">
        <span class="sheet-row-label">Interests</span>
        <span class="sheet-row-value" id="sheet-industries">–</span>
      </div>
    </div>

    <div class="sheet-section">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <div class="sheet-section-label" style="margin-bottom:0;">Certifications</div>
        <button onclick="toggleCertEdit()" id="cert-edit-btn" style="font-size:12px;font-weight:500;color:#3B6D11;background:none;border:none;cursor:pointer;font-family:inherit;padding:0;">Edit</button>
      </div>
      <div id="sheet-certs"><span class="sheet-cert-none">None selected</span></div>
      <div id="cert-editor" style="display:none;margin-top:10px;"></div>
    </div>

    <div class="sheet-section">
      <div class="sheet-section-label">Contact</div>
      <div style="display:flex;align-items:center;gap:10px;">
        <input id="sheet-phone-input" type="tel" placeholder="Phone number"
          style="flex:1;padding:10px 12px;font-size:14px;border:0.5px solid #D3D1C7;border-radius:8px;background:#fff;color:#1C1C1A;font-family:inherit;outline:none;"
          onfocus="this.style.borderColor='#3B6D11'" onblur="this.style.borderColor='#D3D1C7'" />
        <button onclick="savePhone()" style="padding:10px 16px;font-size:13px;font-weight:600;background:#3B6D11;color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:inherit;white-space:nowrap;">Save</button>
      </div>
      <div id="phone-save-status" style="font-size:12px;color:#3B6D11;margin-top:6px;display:none;"></div>
    </div>

    <button class="sheet-edit" onclick="window.location.href='/student/onboarding.html'">Edit my information</button>
    <button class="sheet-logout" onclick="logout()">Log out</button>
  </div>
</div>

<script>
  const _sb = window.supabase.createClient(
    'https://mccrpgqtqtrxfifxvwbd.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jY3JwZ3F0cXRyeGZpZnh2d2JkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NTAwMDIsImV4cCI6MjA5NDEyNjAwMn0.iB3u2M7H0-D2Z2SbRQN0vHtOB62sASsGeF09FICzcc4'
  );

  let currentSession = null;
  let myCerts = [];
  let currentJobs = [];
  let employerMap = {};

  (async () => {
    const { data: { session } } = await _sb.auth.getSession();
    if (!session) { window.location.href = '/'; return; }
    currentSession = session;

    const email = session.user.email || '';
    const initial = email.charAt(0).toUpperCase();
    document.getElementById('sheet-email').textContent = email;

    const phone = session.user.user_metadata?.phone || '';
    if (phone) {
      document.getElementById('sheet-phone-display').textContent = phone;
      document.getElementById('sheet-phone-display').style.display = 'block';
      document.getElementById('sheet-phone-input').value = phone;
    }

    // Load existing avatar if present
    const savedUrl = session.user.user_metadata?.avatar_url
      || JSON.parse(localStorage.getItem('hg_profile') || '{}').avatar_url;
    if (savedUrl) {
      loadAvatar(savedUrl);
    } else {
      document.getElementById('profile-btn').textContent = initial;
    }

    const profile = JSON.parse(localStorage.getItem('hg_profile') || 'null');
    populateSheet(session.user, profile);

    const county = profile?.county;
    if (county && county !== 'Outside New York' && county !== 'Other upstate NY county') {
      document.getElementById('feed-title').textContent = 'Jobs for you in ' + county;
    }

    const [{ data: studentData }, { data: jobs, error: jobsError }] = await Promise.all([
      _sb.from('students').select('certifications').eq('id', session.user.id).single(),
      _sb.from('jobs').select('*').eq('is_active', true).order('created_at', { ascending: false })
    ]);

    if (jobsError) {
      console.error('[homegrown] jobs query error:', jobsError);
    }
    console.log('[homegrown] jobs returned:', jobs?.length ?? 0, jobs);

    myCerts = studentData?.certifications || profile?.certifications || [];
    currentJobs = jobs || [];

    // Fetch employer application methods for all companies in the feed
    const companyNames = [...new Set(currentJobs.map(j => j.company_name).filter(Boolean))];
    if (companyNames.length > 0) {
      const { data: emps } = await _sb.from('employers')
        .select('company_name, application_method, contact_name, contact_phone, ats_url')
        .in('company_name', companyNames);
      (emps || []).forEach(e => { employerMap[e.company_name] = e; });
    }

    updateCertDisplay(myCerts);
    initCertEditor(myCerts);
    document.getElementById('jobs-loading').remove();
    renderJobs(currentJobs, myCerts);
  })();

  function populateSheet(user, profile) {
    const meta = user.user_metadata || {};
    const name = meta.full_name || meta.name
      || ((meta.first_name || meta.last_name) ? `${meta.first_name || ''} ${meta.last_name || ''}`.trim() : '');
    document.getElementById('sheet-name').textContent = name || user.email;

    if (!profile) return;

    const bgLabels = { boces: 'BOCES Program', college: 'College', job: 'On the Job', military: 'Military / Veteran' };
    const backgrounds = profile.backgrounds || (profile.path ? [profile.path] : []);
    const pathLabel = backgrounds.map(b => bgLabels[b] || b).join(', ') || '–';
    document.getElementById('sheet-path').textContent = pathLabel;

    const program = profile.boces_program || profile.program || null;
    if (program) {
      document.getElementById('sheet-program').textContent = program;
      document.getElementById('sheet-program-row').style.display = 'flex';
    }
    if (profile.graduation_year) {
      document.getElementById('sheet-year').textContent = profile.graduation_year;
      document.getElementById('sheet-year-row').style.display = 'flex';
    }
    if (profile.county) {
      document.getElementById('sheet-county').textContent = profile.county;
      document.getElementById('sheet-county-row').style.display = 'flex';
    }
    if (profile.industries && profile.industries.length > 0) {
      document.getElementById('sheet-industries').textContent = profile.industries.join(', ');
      document.getElementById('sheet-industries-row').style.display = 'flex';
    }

    updateCertDisplay(profile.certifications || []);
  }

  function openSheet() {
    const overlay = document.getElementById('sheet-overlay');
    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeSheet() {
    document.getElementById('sheet-overlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  function closeSheetOnOverlay(e) {
    if (e.target === document.getElementById('sheet-overlay')) closeSheet();
  }

  function renderJobs(jobs, myCerts) {
    const feed = document.getElementById('job-feed');

    if (jobs.length === 0) {
      feed.innerHTML = `
        <div style="text-align:center;padding:40px 0 20px;color:#999;font-size:14px;line-height:1.6;">
          No jobs posted yet —<br>check back soon as employers join.
        </div>
        <div style="text-align:center;font-size:13px;color:#bbb;padding-bottom:32px;">
          More jobs coming soon as we onboard local employers.
        </div>`;
      return;
    }

    feed.innerHTML = jobs.map((job, idx) => {
      const reqCerts = job.certifications_required || [];
      const allMet = reqCerts.length === 0 || reqCerts.every(c => myCerts.includes(c));

      // Support both new and legacy column names
      const roleTitle = job.role_title || job.role || '';
      const locationStr = [job.city, job.state].filter(Boolean).join(', ') || job.location || '';
      const shiftStr = job.shift_type || job.shift || '';
      const jobTypeStr = job.job_type || '';

      // All job attributes in one unified pill row
      const allPills = [
        shiftStr,
        jobTypeStr,
        ...(Array.isArray(job.benefits) ? job.benefits : []),
        job.is_union ? 'Union shop' : null,
        job.sign_on_bonus ? `${job.sign_on_bonus} sign-on` : null,
        job.offers_apprenticeships  ? '✓ Apprenticeships available' : null,
      ].filter(s => s && String(s).trim().length > 0);
      const pills = allPills.map(p => `<span class="app-fit-pill">${esc(p)}</span>`).join('');

      const certPills = reqCerts.map(c => {
        const has = myCerts.includes(c);
        return `<span class="app-cert-pill ${has ? 'app-cert-green' : 'app-cert-gray'}">${has ? '✓' : '+'} ${esc(c)}</span>`;
      }).join('');

      const sponsorBadge = job.sponsors_certifications
        ? `<div class="sponsor-badge">
             <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#3B6D11" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
             Will pay for your training &amp; certs
           </div>`
        : '';

      const dataCompany = `data-company="${esc(job.company_name || '')}"`;
      const emp = employerMap[job.company_name] || {};
      const appMethod = emp.application_method || 'homegrown';
      const contactName  = emp.contact_name  || '';
      const contactPhone = emp.contact_phone || '';
      const atsUrl       = emp.ats_url       || '';
      const cleanPhone   = contactPhone.replace(/\D/g, '');
      const sponsored    = !!job.sponsors_certifications;
      const anyway       = !allMet && sponsored;

      let btn;
      if (!allMet && !sponsored) {
        // Blocked — missing certs, no sponsorship
        btn = `<button disabled style="width:100%;padding:12px;font-size:14px;font-weight:500;background:#F5F4F0;color:#B4B2A9;border:0.5px solid #E0DED6;border-radius:8px;cursor:default;font-family:inherit;">Get the certifications above to apply</button>`;
      } else if (appMethod === 'call' && cleanPhone) {
        // Call to apply
        const label = anyway ? 'Call anyway →' : 'Call to apply';
        const subtext = [contactName ? 'Ask for ' + esc(contactName) : '', esc(contactPhone)].filter(Boolean).join(' · ');
        btn = `<a href="tel:${cleanPhone}" class="app-btn-primary" style="display:block;text-align:center;text-decoration:none;${anyway ? 'background:#5a9e20;' : ''}margin-top:8px;">${label}</a>
               ${subtext ? `<div style="font-size:12px;color:#666660;text-align:center;margin-top:5px;">${subtext}</div>` : ''}
               ${anyway ? `<div style="font-size:12px;color:#3B6D11;text-align:center;margin-top:2px;">They'll help you get certified</div>` : ''}`;
      } else if (appMethod === 'ats' && atsUrl) {
        // External ATS link
        btn = `<a href="${esc(atsUrl)}" target="_blank" rel="noopener noreferrer" class="app-btn-primary" style="display:block;text-align:center;text-decoration:none;${anyway ? 'background:#5a9e20;' : ''}margin-top:8px;">Apply on their website →</a>
               ${anyway ? `<div style="font-size:12px;color:#3B6D11;text-align:center;margin-top:4px;">They'll help you get certified</div>` : ''}`;
      } else {
        // Through Homegrown (default)
        btn = `<button class="app-btn-primary" ${dataCompany} data-job-id="${job.id}" onclick="showApplyConfirm(this)" style="${anyway ? 'background:#5a9e20;' : ''}margin-top:8px;">${anyway ? 'Apply anyway →' : 'Apply Now'}</button>`;
      }

      const hasDesc = job.student_description && job.student_description.trim().length > 0;
      const descId  = `desc-${idx}`;

      return `
        <div class="app-job-card">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;">
            <div class="app-job-role" style="margin-bottom:2px;">${esc(roleTitle)}</div>
            ${job.company_name ? `<a href="/student/company.html?name=${encodeURIComponent(job.company_name)}" style="white-space:nowrap;font-size:11px;font-weight:500;color:#3B6D11;background:#EAF3DE;border-radius:20px;padding:4px 10px;text-decoration:none;flex-shrink:0;margin-top:3px;">About →</a>` : ''}
          </div>
          ${job.company_name ? `<div class="app-job-company" style="margin-bottom:6px;">${esc(job.company_name)}</div>` : ''}
          ${locationStr ? `<div class="app-job-location">📍 ${esc(locationStr)}</div>` : ''}
          ${job.pay ? `<div class="app-job-pay">${esc(formatPay(job.pay))}</div>` : ''}
          ${pills ? `<div class="app-fit-pills">${pills}</div>` : ''}
          ${reqCerts.length > 0 ? `
            <div class="app-cert-row">
              <div class="app-cert-label">Certifications</div>
              <div class="app-cert-pills">${certPills}</div>
            </div>` : ''}
          ${hasDesc ? `
            <div style="margin-bottom:10px;">
              <button onclick="toggleDesc('${descId}',this)" style="background:none;border:none;padding:8px 0 0;font-size:12px;color:#3B6D11;text-decoration:underline;cursor:pointer;font-family:inherit;display:block;">What's the job like? ↓</button>
              <div class="job-desc-expand" id="${descId}" style="overflow:hidden;max-height:0;transition:max-height 0.35s ease;">
                <div style="padding-top:10px;border-top:0.5px solid #D3D1C7;margin-top:8px;">
                  <div style="font-size:13px;color:#444441;line-height:1.6;font-style:italic;">${esc(job.student_description)}</div>
                </div>
              </div>
            </div>` : ''}
          ${sponsorBadge}
          ${btn}
        </div>`;
    }).join('') + `
      <div style="text-align:center;font-size:13px;color:#999;margin-top:8px;padding-bottom:32px;">
        More jobs coming soon as we onboard local employers.
      </div>`;
  }

  function toggleDesc(id, btn) {
    const el = document.getElementById(id);
    const isOpen = el.style.maxHeight !== '0px' && el.style.maxHeight !== '';
    if (isOpen) {
      el.style.maxHeight = '0';
      btn.textContent = "What's the job like? ↓";
    } else {
      el.style.maxHeight = el.scrollHeight + 'px';
      btn.textContent = "Show less ↑";
    }
  }

  function esc(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function formatPay(pay) {
    if (!pay) return '';
    const s = String(pay).trim();
    if (s.startsWith('$')) return s;          // already formatted
    const n = parseFloat(s);
    if (!isNaN(n)) return `$${n}/hr`;         // bare number → $24/hr
    return s;                                  // unexpected format, show as-is
  }

  function loadAvatar(url) {
    // Sheet circle
    const circle = document.getElementById('photo-circle');
    const preview = document.getElementById('photo-preview');
    const placeholder = document.getElementById('photo-placeholder');
    preview.src = url;
    preview.style.display = 'block';
    placeholder.style.display = 'none';
    circle.classList.add('has-photo');
    document.getElementById('photo-label').textContent = 'Edit photo';
    // Nav button
    const btn = document.getElementById('profile-btn');
    btn.textContent = '';
    btn.innerHTML = `<img src="${url}" alt="Profile" onerror="this.parentElement.textContent='${(currentSession?.user?.email||'')[0].toUpperCase()}'" />`;
  }

  async function handlePhotoSelect(e) {
    const file = e.target.files[0];
    if (!file) return;

    // Instant local preview
    const reader = new FileReader();
    reader.onload = ev => loadAvatar(ev.target.result);
    reader.readAsDataURL(file);

    // Show uploading state
    const uploadingEl = document.getElementById('photo-uploading');
    uploadingEl.style.display = 'block';

    try {
      const userId = currentSession.user.id;
      const ext = file.name.split('.').pop() || 'jpg';
      const path = `${userId}/avatar.${ext}`;

      const { error: uploadErr } = await _sb.storage
        .from('avatars')
        .upload(path, file, { upsert: true, contentType: file.type });

      if (uploadErr) throw uploadErr;

      const { data: { publicUrl } } = _sb.storage.from('avatars').getPublicUrl(path);

      // Persist to auth metadata and localStorage
      await _sb.auth.updateUser({ data: { avatar_url: publicUrl } });
      const profile = JSON.parse(localStorage.getItem('hg_profile') || '{}');
      profile.avatar_url = publicUrl;
      localStorage.setItem('hg_profile', JSON.stringify(profile));

      // Switch preview from data URL to the real CDN URL
      loadAvatar(publicUrl);
      document.getElementById('photo-label').textContent = 'Photo saved ✓';
      setTimeout(() => { document.getElementById('photo-label').textContent = 'Edit photo'; }, 2500);
    } catch (err) {
      console.error('Photo upload failed:', err);
      document.getElementById('photo-label').textContent = 'Upload failed — try again';
    } finally {
      uploadingEl.style.display = 'none';
      e.target.value = '';   // allow re-selecting same file
    }
  }

  async function savePhone() {
    const phone = document.getElementById('sheet-phone-input').value.trim();
    const statusEl = document.getElementById('phone-save-status');
    if (!phone) return;
    const { error } = await _sb.auth.updateUser({ data: { phone } });
    if (error) {
      statusEl.textContent = 'Could not save — try again.';
      statusEl.style.color = '#c0392b';
    } else {
      statusEl.textContent = '✓ Saved';
      statusEl.style.color = '#3B6D11';
      document.getElementById('sheet-phone-display').textContent = phone;
      document.getElementById('sheet-phone-display').style.display = 'block';
    }
    statusEl.style.display = 'block';
    setTimeout(() => { statusEl.style.display = 'none'; }, 2500);
  }

  async function showApplyConfirm(btn) {
    const companyName = btn.dataset.company || '';
    const jobId = btn.dataset.jobId || null;
    const card = btn.closest('.app-job-card');
    btn.disabled = true;
    btn.textContent = '✓ Interest sent!';
    btn.style.background = '#5a9e20';
    if (card) {
      const note = document.createElement('div');
      note.style.cssText = 'font-size:12px;color:#3B6D11;text-align:center;margin-top:6px;';
      note.textContent = companyName
        ? `${companyName} will be notified of your interest.`
        : 'The employer will be notified of your interest.';
      card.appendChild(note);
    }
    // Write application to Supabase
    if (jobId && currentSession) {
      const meta = currentSession.user.user_metadata || {};
      const name = meta.full_name || meta.name
        || ((meta.first_name || meta.last_name) ? `${meta.first_name || ''} ${meta.last_name || ''}`.trim() : null);
      const profile = JSON.parse(localStorage.getItem('hg_profile') || '{}');
      await _sb.from('applications').upsert({
        job_id: jobId,
        student_id: currentSession.user.id,
        student_name: name || null,
        student_email: currentSession.user.email || null,
        student_phone: meta.phone || null,
        student_county: profile.county || null,
        certifications: myCerts.length > 0 ? myCerts : null,
        status: 'new'
      }, { onConflict: 'job_id,student_id', ignoreDuplicates: true });
    }
  }

  // ── Cert matching constants ──
  const ALL_CERTS = [
    'OSHA 10 Certification',
    'Blueprint Reading',
    'Hand Tool Safety',
    'IBEW Apprenticeship Application',
    'Hydraulic Systems Certification',
    'ServSafe Certification',
    'NYS CNA License',
    'Adobe Certified Professional',
    'CDL License',
    'Security Guard Certification',
    'Forklift Operator Certification',
    'NYS Cosmetology License',
    'CPR / First Aid Certified',
  ];

  function updateCertDisplay(certs) {
    const certsEl = document.getElementById('sheet-certs');
    if (!certsEl) return;
    if (certs && certs.length > 0) {
      certsEl.innerHTML = '<div class="sheet-cert-pills">' +
        certs.map(c => `<span class="sheet-cert-pill">${esc(c)}</span>`).join('') +
        '</div>';
    } else {
      certsEl.innerHTML = '<span class="sheet-cert-none">None selected</span>';
    }
  }

  function initCertEditor(currentCerts) {
    const editor = document.getElementById('cert-editor');
    if (!editor) return;
    const saved = currentCerts || [];
    editor.innerHTML = ALL_CERTS.map(cert => {
      const has = saved.includes(cert);
      return `<div class="cert-edit-row${has ? ' cert-edit-selected' : ''}" onclick="toggleCertRow(this)">
        <div class="cert-edit-box">✓</div>
        <div class="cert-edit-label">${esc(cert)}</div>
      </div>`;
    }).join('') +
    `<button onclick="saveCerts()" style="width:100%;padding:10px;margin-top:12px;font-size:13px;font-weight:600;background:#3B6D11;color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:inherit;">Save certifications</button>
     <div id="cert-save-status" style="font-size:12px;color:#3B6D11;text-align:center;margin-top:6px;display:none;"></div>`;
  }

  function toggleCertEdit() {
    const editor = document.getElementById('cert-editor');
    const btn = document.getElementById('cert-edit-btn');
    const isOpen = editor.style.display !== 'none';
    editor.style.display = isOpen ? 'none' : 'block';
    btn.textContent = isOpen ? 'Edit' : 'Done';
  }

  function toggleCertRow(el) {
    el.classList.toggle('cert-edit-selected');
  }

  async function saveCerts() {
    const selectedCerts = Array.from(
      document.querySelectorAll('#cert-editor .cert-edit-row.cert-edit-selected .cert-edit-label')
    ).map(el => el.textContent);

    const statusEl = document.getElementById('cert-save-status');
    statusEl.style.display = 'none';

    const { error } = await _sb.from('students').upsert({
      id: currentSession.user.id,
      certifications: selectedCerts.length > 0 ? selectedCerts : null
    });

    if (error) {
      statusEl.textContent = 'Could not save — try again.';
      statusEl.style.color = '#c0392b';
      statusEl.style.display = 'block';
      return;
    }

    // Update state
    myCerts = selectedCerts;
    const profile = JSON.parse(localStorage.getItem('hg_profile') || '{}');
    profile.certifications = selectedCerts;
    localStorage.setItem('hg_profile', JSON.stringify(profile));

    // Refresh cert display and job feed
    updateCertDisplay(myCerts);
    renderJobs(currentJobs, myCerts);  // employerMap already in scope

    statusEl.textContent = '✓ Saved';
    statusEl.style.color = '#3B6D11';
    statusEl.style.display = 'block';

    setTimeout(() => {
      toggleCertEdit();
      statusEl.style.display = 'none';
    }, 1200);
  }

  async function logout() {
    await _sb.auth.signOut();
    window.location.href = '/';
  }

  // ── Swipe-down to close ──
  (function initSwipe() {
    const sheet = document.getElementById('profile-sheet');
    const overlay = document.getElementById('sheet-overlay');
    let startY = 0, currentY = 0, dragging = false;
    const THRESHOLD = 140;

    function onStart(e) {
      if (!overlay.classList.contains('open')) return;
      startY = e.touches ? e.touches[0].clientY : e.clientY;
      dragging = true;
      sheet.style.transition = 'none';
    }

    function onMove(e) {
      if (!dragging) return;
      currentY = (e.touches ? e.touches[0].clientY : e.clientY) - startY;
      if (currentY < 0) currentY = 0;
      sheet.style.transform = `translateY(${currentY}px)`;
      overlay.style.background = `rgba(0,0,0,${Math.max(0, 0.35 - currentY / 800)})`;
    }

    function onEnd() {
      if (!dragging) return;
      dragging = false;
      sheet.style.transition = 'transform 0.3s ease';
      overlay.style.transition = 'background 0.3s ease';
      if (currentY > THRESHOLD) {
        sheet.style.transform = 'translateY(100%)';
        setTimeout(() => {
          closeSheet();
          sheet.style.transform = '';
          overlay.style.background = '';
          overlay.style.transition = '';
        }, 300);
      } else {
        sheet.style.transform = 'translateY(0)';
        overlay.style.background = 'rgba(0,0,0,0.35)';
        setTimeout(() => { overlay.style.transition = ''; }, 300);
      }
      currentY = 0;
    }

    sheet.addEventListener('touchstart', onStart, { passive: true });
    sheet.addEventListener('touchmove', onMove, { passive: true });
    sheet.addEventListener('touchend', onEnd);
  })();
</script>
</body>
