<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Homegrown — Your Jobs</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="../shared/styles.css" />
</head>
<body>
<div class="app-wrap">

  <div class="app-header">
    <div style="display:flex;align-items:center;gap:7px;"><svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M11 18V10" stroke="#3B6D11" stroke-width="1.5" stroke-linecap="round"/><path d="M11 10C11 10 6 9 5 4C5 4 10 3 13 7C14.5 9 11 10 11 10Z" fill="#3B6D11" opacity="0.9"/><path d="M11 13C11 13 14.5 11.5 17 13C17 13 16 17 13 17.5C11.5 17.7 11 13 11 13Z" fill="#639922" opacity="0.7"/></svg><span style="font-size:16px;font-weight:600;color:#1C1C1A;letter-spacing:-0.4px;">home<span style="color:#3B6D11;">grown</span>.ai</span></div>
    <div style="display:flex;align-items:center;gap:10px;">
      <button onclick="logout()" style="font-size:12px;color:#999;background:none;border:none;cursor:pointer;font-family:inherit;">Log out</button>
      <div class="app-profile" id="profile-icon">–</div>
    </div>
  </div>

  <div class="app-content">
    <div class="app-step-title">Jobs for you in Chenango County</div>
    <div class="app-step-sub">Updated daily</div>
    <div id="job-feed">
      <div style="text-align:center;padding:40px 0;color:#bbb;font-size:14px;">Loading jobs…</div>
    </div>
  </div>

</div>
<script>
  const _sb = window.supabase.createClient(
    'https://mccrpgqtqtrxfifxvwbd.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jY3JwZ3F0cXRyeGZpZnh2d2JkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NTAwMDIsImV4cCI6MjA5NDEyNjAwMn0.iB3u2M7H0-D2Z2SbRQN0vHtOB62sASsGeF09FICzcc4'
  );

  (async () => {
    const { data: { session } } = await _sb.auth.getSession();
    if (!session) { window.location.href = '/'; return; }

    document.getElementById('profile-icon').textContent = session.user.email.charAt(0).toUpperCase();

    const [{ data: studentData }, { data: jobs }] = await Promise.all([
      _sb.from('students').select('certifications').eq('id', session.user.id).single(),
      _sb.from('jobs').select('*').eq('is_active', true).order('created_at', { ascending: false })
    ]);

    const myCerts = studentData?.certifications || [];
    renderJobs(jobs || [], myCerts);
  })();

  function renderJobs(jobs, myCerts) {
    const feed = document.getElementById('job-feed');

    if (jobs.length === 0) {
      feed.innerHTML = `
        <div style="text-align:center;padding:40px 0 20px;color:#999;font-size:14px;line-height:1.6;">
          No jobs posted yet —<br>check back soon as employers join.
        </div>
        <div style="text-align:center;font-size:13px;color:#bbb;padding-bottom:32px;">
          More jobs coming soon as we onboard local employers.
        </div>`;
      return;
    }

    feed.innerHTML = jobs.map(job => {
      const reqCerts = job.certifications_required || [];
      const allMet = reqCerts.length === 0 || reqCerts.every(c => myCerts.includes(c));

      const pills = [job.job_type, job.shift, job.benefits]
        .filter(Boolean)
        .map(p => `<span class="app-fit-pill">${p}</span>`)
        .join('');

      const certPills = reqCerts.map(c => {
        const has = myCerts.includes(c);
        return `<span class="app-cert-pill ${has ? 'app-cert-green' : 'app-cert-gray'}">${has ? '✓' : '+'} ${c}</span>`;
      }).join('');

      const btn = allMet
        ? `<button class="app-btn-primary">Apply Now</button>`
        : `<button class="app-btn-gray">Complete certs to apply</button>`;

      return `
        <div class="app-job-card">
          <div class="app-job-company">${esc(job.company_name)}</div>
          <div class="app-job-role">${esc(job.role)}</div>
          <div class="app-job-location">📍 ${esc(job.location)}</div>
          <div class="app-job-pay">${esc(job.pay)}</div>
          ${pills ? `<div class="app-fit-pills">${pills}</div>` : ''}
          ${reqCerts.length > 0 ? `
            <div class="app-cert-row">
              <div class="app-cert-label">Certifications</div>
              <div class="app-cert-pills">${certPills}</div>
            </div>` : ''}
          ${btn}
        </div>`;
    }).join('') + `
      <div style="text-align:center;font-size:13px;color:#999;margin-top:8px;padding-bottom:32px;">
        More jobs coming soon as we onboard local employers.
      </div>`;
  }

  function esc(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function logout() {
    await _sb.auth.signOut();
    window.location.href = '/';
  }
</script>
</body>
</html>
